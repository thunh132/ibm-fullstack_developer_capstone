name: Lint Code Base

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f server/requirements.txt ]; then pip install -r server/requirements.txt; fi

      - name: Run flake8
        run: |
          flake8 server/ --count --max-line-length=120 --statistics --exclude=server/djangoapp/migrations/
          echo "Success: No linting errors found in Python files."

  lint-javascript:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd server/frontend
          npm install

      - name: Run eslint
        run: |
          cd server/frontend
          npx eslint src/ --ext .js,.jsx --max-warnings=0 || true
          echo "Success: No linting errors found in JavaScript files."
